name: Backend & Middleware CI/CD

on:
  push:
    branches: [ main, develop, staging ]
    paths:
      - 'middleware/**'
      - 'config/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop, staging ]
    paths:
      - 'middleware/**'
      - 'config/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: apolaki

jobs:
  # Node.js Microservices
  backend-lint:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'middleware/netlify-db-service/package-lock.json'
      
      - name: Install dependencies (netlify-db-service)
        run: |
          cd middleware/netlify-db-service
          npm ci
      
      - name: Run linter
        run: |
          cd middleware/netlify-db-service
          npm run lint --if-present
        continue-on-error: true
      
      - name: Run tests
        run: |
          cd middleware/netlify-db-service
          npm run test --if-present
        continue-on-error: true

  # Go Microservices
  solar-service-lint:
    name: Solar Service Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache-dependency-path: 'middleware/solar-service/go.sum'
      
      - name: Run go fmt
        run: |
          cd middleware/solar-service
          if [ -z "$(gofmt -s .)" ]; then
            echo "gofmt check passed"
          else
            echo "gofmt check failed"
            gofmt -d .
            exit 1
          fi
        continue-on-error: true
      
      - name: Run go vet
        run: |
          cd middleware/solar-service
          go vet ./...
        continue-on-error: true
      
      - name: Run tests
        run: |
          cd middleware/solar-service
          go test -v ./...
        continue-on-error: true

  # Docker builds
  docker-build-db-service:
    name: Build DB Service Docker Image
    runs-on: ubuntu-latest
    needs: backend-lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: middleware/netlify-db-service
          push: false
          tags: netlify-db-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-solar-service:
    name: Build Solar Service Docker Image
    runs-on: ubuntu-latest
    needs: solar-service-lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: middleware/solar-service
          push: false
          tags: solar-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Database migrations
  database-validation:
    name: Validate Database Schema
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate SQL syntax
        run: |
          cd config
          # Check that SQL file is valid
          if [ -f init-db.sql ]; then
            echo "Checking SQL syntax..."
            # Install postgres client tools
            sudo apt-get update && sudo apt-get install -y postgresql-client
            
            # Try to connect and validate
            echo "SQL file found and ready for validation"
          fi
      
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
      
      - name: Initialize database
        env:
          PGPASSWORD: postgres
        run: |
          cd config
          psql -h localhost -U postgres -f init-db.sql
        continue-on-error: true

  # Code quality
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  # Integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-lint, solar-service-lint]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Run integration tests
        run: |
          echo "Integration tests would run here"
          echo "Services available: PostgreSQL, Redis"
        continue-on-error: true

  # Dependency check
  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Dependency check (OWASP)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: '.'
          format: 'JSON'
        continue-on-error: true
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
        continue-on-error: true
