name: Deploy to Kubernetes

on:
  push:
    branches: [ main, staging ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.apolaki-solar.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name apolaki-staging --region ${{ secrets.AWS_REGION }}
      
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'
      
      - name: Deploy with Helm
        run: |
          # Install/upgrade frontend
          helm upgrade --install apolaki-frontend ./helm/frontend \
            --namespace staging \
            --create-namespace \
            --values ./helm/values-staging.yaml \
            --set image.tag=${{ github.sha }}
          
          # Install/upgrade db-service
          helm upgrade --install apolaki-db-service ./helm/db-service \
            --namespace staging \
            --create-namespace \
            --values ./helm/values-staging.yaml \
            --set image.tag=${{ github.sha }}
          
          # Install/upgrade solar-service
          helm upgrade --install apolaki-solar-service ./helm/solar-service \
            --namespace staging \
            --create-namespace \
            --values ./helm/values-staging.yaml \
            --set image.tag=${{ github.sha }}
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/apolaki-frontend -n staging --timeout=5m
          kubectl rollout status deployment/apolaki-db-service -n staging --timeout=5m
          kubectl rollout status deployment/apolaki-solar-service -n staging --timeout=5m
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging environment..."
          # Add your smoke test commands here
      
      - name: Notify Slack on success
        uses: slackapi/slack-github-action@v1
        if: success()
        with:
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Staging Deployment Successful*\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://apolaki-solar.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Confirm deployment
        run: |
          echo "Deploying to production..."
          echo "Version: ${{ github.ref_name }}"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name apolaki-production --region ${{ secrets.AWS_REGION }}
      
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'
      
      - name: Create backup
        run: |
          echo "Creating backup before production deployment..."
          # Add backup logic here
      
      - name: Deploy with Helm
        run: |
          # Install/upgrade frontend
          helm upgrade --install apolaki-frontend ./helm/frontend \
            --namespace production \
            --create-namespace \
            --values ./helm/values-production.yaml \
            --set image.tag=${{ github.ref_name }}
          
          # Install/upgrade db-service
          helm upgrade --install apolaki-db-service ./helm/db-service \
            --namespace production \
            --create-namespace \
            --values ./helm/values-production.yaml \
            --set image.tag=${{ github.ref_name }}
          
          # Install/upgrade solar-service
          helm upgrade --install apolaki-solar-service ./helm/solar-service \
            --namespace production \
            --create-namespace \
            --values ./helm/values-production.yaml \
            --set image.tag=${{ github.ref_name }}
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/apolaki-frontend -n production --timeout=10m
          kubectl rollout status deployment/apolaki-db-service -n production --timeout=10m
          kubectl rollout status deployment/apolaki-solar-service -n production --timeout=10m
      
      - name: Verify deployment
        run: |
          echo "Verifying production deployment..."
          kubectl get pods -n production
          kubectl get svc -n production
      
      - name: Run health checks
        run: |
          echo "Running health checks..."
          # Add your health check commands here
      
      - name: Notify Slack on success
        uses: slackapi/slack-github-action@v1
        if: success()
        with:
          payload: |
            {
              "text": "✅ Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Production Deployment Successful*\n*Version:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v1
        if: failure()
        with:
          payload: |
            {
              "text": "❌ Production deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Production Deployment Failed*\n*Version:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy-production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name apolaki-production --region ${{ secrets.AWS_REGION }}
      
      - name: Rollback deployment
        run: |
          echo "Rolling back to previous stable version..."
          kubectl rollout undo deployment/apolaki-frontend -n production
          kubectl rollout undo deployment/apolaki-db-service -n production
          kubectl rollout undo deployment/apolaki-solar-service -n production
      
      - name: Verify rollback
        run: |
          kubectl rollout status deployment/apolaki-frontend -n production
          kubectl rollout status deployment/apolaki-db-service -n production
          kubectl rollout status deployment/apolaki-solar-service -n production
      
      - name: Notify Slack on rollback
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🔄 Production deployment rolled back",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔄 *Production Deployment Rolled Back*\n*Reason:* Deployment failure detected"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
