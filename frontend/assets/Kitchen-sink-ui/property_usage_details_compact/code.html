<!DOCTYPE html>

<style>
        @font-face {
            font-family: 'TT Fors';
            src: url('https://fonts.cdnfonts.com/css/tt-fors') format('woff2');
            font-weight: 700;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfdfd; 
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .tight-display { letter-spacing: -0.04em; line-height: 1.1; }
        .tt-fors-bold { font-family: 'TT Fors', sans-serif; font-weight: 700; }
        .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="text-on-surface antialiased pb-24">
<!-- Header (EXACT from SCREEN_19/SCREEN_63/SCREEN_87) -->
<header class="flex justify-between items-center px-6 w-full sticky top-0 z-50 bg-[#fdfdfd]/80 backdrop-blur-xl border-b border-slate-100 h-16">
<div class="flex items-center">
<img alt="Apolaki Logo" class="w-auto object-contain h-8" src="https://lh3.googleusercontent.com/aida/ADBb0uhEyrNrC8SfZuaMPvG1lXK-7PqtGkUOtDmxFmnVIskwppx12fWcA__-Q2fKt34_Eq6xS3EBKyszv0jzSz2TwuBCnV3cpX_gr5-I169R86kt4Kbx9YoowRrmUoIBWE0tJ6B9G_I2vs1IfYgaa9_0I1l_YKUu6vq789S4X0nFzoWe9pWSn9TWJr3fLXmOm4bjH-IEu1c4CmlErxrqWYsl9qwadE4tJ9Oz2k2gh1wUDPrXZysKVxZ-H8273LTYjOLy7dvogWWoDXw83EI"/>
</div>
<div class="flex items-center gap-3">
<button class="p-2 rounded-xl hover:bg-slate-50 transition-colors text-slate-600">
<span class="material-symbols-outlined text-[24px]" data-icon="chat">chat</span>
</button>
<button class="relative rounded-full transition-all p-1 hover:bg-slate-50">
<span class="material-symbols-outlined text-[24px] text-slate-700" data-icon="account_circle">account_circle</span>
<span class="absolute w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full top-0.5 right-0.5"></span>
</button>
</div>
</header>
<!-- Step Indicator Bar -->
<div class="w-full bg-slate-100 h-1.5">
<div class="bg-primary h-full w-full transition-all duration-500"></div>
</div>
<main class="px-6 pt-6 pb-8 max-w-md mx-auto">
<!-- Progress Label -->
<div class="mb-4">
<span class="text-[10px] font-bold text-primary uppercase tracking-[0.2em] block mb-2">Step 2 of 2</span>
</div>
<!-- Title Section -->
<div class="mb-8">
<h1 class="text-[32px] tt-fors-bold tight-display text-[#0f6cbd]">Property &amp; Usage Details</h1>
<p class="mt-2 text-on-surface-variant text-sm opacity-80 leading-relaxed">Provide technical data to ensure our solar engine calculates your optimal yield.</p>
</div>
<!-- Form Section -->
<div class="space-y-5">
<!-- Numeric Inputs Grid -->
<div class="grid grid-cols-1 gap-4">
<div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-[0_8px_30px_rgba(0,0,0,0.02)]">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Roof Area</label>
<div class="flex items-center justify-between">
<input class="w-full bg-transparent border-none p-0 text-2xl font-bold text-on-surface focus:ring-0 placeholder:text-slate-200" placeholder="0" type="number"/>
<span class="text-xs font-bold text-primary uppercase tracking-widest">sqm</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-[0_8px_30px_rgba(0,0,0,0.02)]">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Monthly Usage</label>
<div class="flex items-center justify-between">
<input class="w-full bg-transparent border-none p-0 text-xl font-bold text-on-surface focus:ring-0 placeholder:text-slate-200" placeholder="0" type="number"/>
<span class="text-[10px] font-bold text-primary">kWh</span>
</div>
</div>
<div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-[0_8px_30px_rgba(0,0,0,0.02)]">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Elec Rate</label>
<div class="flex items-center justify-between">
<input class="w-full bg-transparent border-none p-0 text-xl font-bold text-on-surface focus:ring-0 placeholder:text-slate-200" placeholder="0.00" step="0.01" type="number"/>
<span class="text-[10px] font-bold text-primary">₱/kWh</span>
</div>
</div>
</div>
</div>
<!-- Selectors -->
<div class="space-y-4">
<div class="relative">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Roof Condition</label>
<select class="w-full appearance-none bg-white border border-slate-100 rounded-2xl px-5 py-4 text-sm font-bold text-on-surface focus:ring-2 focus:ring-primary/10 shadow-sm">
<option>Excellent</option>
<option>Good</option>
<option>Fair</option>
<option>Poor</option>
</select>
<span class="material-symbols-outlined absolute right-4 bottom-3.5 text-slate-400 pointer-events-none text-xl">expand_more</span>
</div>
<div class="relative">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Sun Exposure</label>
<select class="w-full appearance-none bg-white border border-slate-100 rounded-2xl px-5 py-4 text-sm font-bold text-on-surface focus:ring-2 focus:ring-primary/10 shadow-sm">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>
<span class="material-symbols-outlined absolute right-4 bottom-3.5 text-slate-400 pointer-events-none text-xl">expand_more</span>
</div>
<div class="relative">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Obstruction Level</label>
<select class="w-full appearance-none bg-white border border-slate-100 rounded-2xl px-5 py-4 text-sm font-bold text-on-surface focus:ring-2 focus:ring-primary/10 shadow-sm">
<option>None</option>
<option>Minimal</option>
<option>Moderate</option>
</select>
<span class="material-symbols-outlined absolute right-4 bottom-3.5 text-slate-400 pointer-events-none text-xl">expand_more</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full mt-6 py-4 rounded-2xl bg-primary text-white font-bold text-[15px] tt-fors-bold shadow-lg shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-2">
<span>See Assessment</span>
<span class="material-symbols-outlined text-xl">trending_up</span>
</button>
</div>
</main>
<!-- Bottom Navigation (EXACT from SCREEN_87/SCREEN_63/SCREEN_19) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-3 pb-8 px-4 bg-white/95 backdrop-blur-xl rounded-t-3xl border-t border-slate-100 shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary tap-highlight-none active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined text-[24px]" data-icon="home">home</span>
<span class="text-[9px] font-bold tt-fors-bold mt-1 uppercase tracking-tighter">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-primary tap-highlight-none active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined text-[24px] fill-1" data-icon="assignment">assignment</span>
<span class="text-[9px] font-bold tt-fors-bold mt-1 uppercase tracking-tighter">Assessment</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary tap-highlight-none active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined text-[24px]" data-icon="payments">payments</span>
<span class="text-[9px] font-bold tt-fors-bold mt-1 uppercase tracking-tighter">Financing</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary tap-highlight-none active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined text-[24px]" data-icon="storefront">storefront</span>
<span class="text-[9px] font-bold tt-fors-bold mt-1 uppercase tracking-tighter">Marketplace</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary tap-highlight-none active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined text-[24px]" data-icon="more_horiz">more_horiz</span>
<span class="text-[9px] font-bold tt-fors-bold mt-1 uppercase tracking-tighter">More</span>
</a>
</nav>
</body></html>
