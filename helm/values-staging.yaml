# Apolaki Platform - Staging Values
replicaCount: 2

image:
  repository: ghcr.io/apolaki/apolaki
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: staging.apolaki-solar.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: staging-tls
      hosts:
        - staging.apolaki-solar.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  - name: NODE_ENV
    value: "staging"
  - name: API_URL
    value: "https://api-staging.apolaki-solar.com"
  - name: LOG_LEVEL
    value: "info"
  - name: ENABLE_MONITORING
    value: "true"

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 2

postgresql:
  enabled: true
  auth:
    username: apolaki
    password: staging_password_change_me
  primary:
    persistence:
      enabled: true
      size: 10Gi

redis:
  enabled: true
  auth:
    enabled: true
    password: staging_redis_password
